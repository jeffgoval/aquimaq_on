<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>Aquimaq</title>
  <meta name="title" content="Aquimaq" />
  <meta name="description"
    content="Loja online de produtos agropecuários: ferramentas manuais, peças de reposição, acessórios e sementes fracionadas. Frete para todo Brasil com entrega rápida." />
  <meta name="keywords"
    content="agropecuária, ferramentas agrícolas, peças de reposição, acessórios agro, sementes, produtos agropecuários, loja agrícola online" />
  <meta name="robots" content="index, follow" />
  <meta name="language" content="Portuguese" />
  <meta name="author" content="Aquimaq" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://aquimaq.com.br/" />
  <meta property="og:title" content="Aquimaq" />
  <meta property="og:description"
    content="Loja online de produtos agropecuários com frete para todo Brasil. Ferramentas, peças, acessórios e sementes." />
  <meta property="og:image" content="https://aquimaq.com.br/logo%20aquimaq.png" />
  <meta property="og:site_name" content="Aquimaq" />
  <meta property="og:locale" content="pt_BR" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://aquimaq.com.br/" />
  <meta name="twitter:title" content="Aquimaq" />
  <meta name="twitter:description" content="Loja online de produtos agropecuários com frete para todo Brasil." />
  <meta name="twitter:image" content="https://aquimaq.com.br/logo%20aquimaq.png" />

  <!-- PWA -->
  <meta name="theme-color" content="#16a34a" />
  <link rel="icon" type="image/png" href="/logo%20aquimaq.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="canonical" content="https://aquimaq.com.br/" />

  <!-- Critical: garante que body/root tenham tamanho e fundo mesmo sem Tailwind -->
  <style>
    html,
    body {
      margin: 0;
      min-height: 100vh;
      background: #f3f4f6;
    }

    #root {
      min-height: 100vh;
      display: block;
      background: #f3f4f6;
    }
  </style>
</head>

<body class="bg-gray-50 text-slate-800 antialiased">
  <div id="root" style="min-height: 100vh; background: #f3f4f6; display: block;">
    <noscript>
      <p style="padding: 2rem; text-align: center; color: #374151;">Ative o JavaScript para usar a Aquimaq.</p>
    </noscript>
  </div>
  <script type="module" src="/src/index.tsx"></script>

  <!-- Chatwoot Widget — carregado na primeira interação do usuário ou após 5s -->
  <script>
    (function() {
      var loaded = false;
      function loadChatwoot() {
        if (loaded) return;
        loaded = true;
        var BASE_URL = "https://chatwoot.aquimaq.com.br";
        var s = document.createElement('script');
        s.src = BASE_URL + "/packs/js/sdk.js";
        s.async = true;
        s.onload = function() {
          window.chatwootSDK.run({ websiteToken: 'Soh7cspZWdMoRK44Rqt5BNwP', baseUrl: BASE_URL });
        };
        document.body.appendChild(s);
      }
      ['scroll', 'mousemove', 'touchstart', 'keydown'].forEach(function(ev) {
        window.addEventListener(ev, loadChatwoot, { once: true, passive: true });
      });
      setTimeout(loadChatwoot, 5000);
    })();
  </script>
</body>

</html>
